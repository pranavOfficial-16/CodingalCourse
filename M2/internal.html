<!DOCTYPE html>
<html>
<head>
    <title>Internal CSS Example</title>
    
    <style>
        h1 {
            color: blue;
            text-align: center;
        }

        p {
            font-size: 18px;
            color: green;
        }

        button {
            background-color: black;
            color: white;
            padding: 10px;
        }
    </style>

</head>
<body>

    <h1>Hello World</h1>

    <p>This is a paragraph styled using internal CSS.</p>

    <button>Click Me</button>

</body>
</html>
